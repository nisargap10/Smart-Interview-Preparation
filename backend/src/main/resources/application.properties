spring.application.name=smart-interview-backend

# Server Port
server.port=8080

# Database Configuration
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:smart_interview_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${MYSQL_DRIVER:org.h2.Driver}
spring.datasource.username=${MYSQL_USER:sa}
spring.datasource.password=${MYSQL_PASSWORD:}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${MYSQL_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# JWT Configuration
# 256-bit secret key (Example base64 encoded secret for development)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.smartinterview=DEBUG
